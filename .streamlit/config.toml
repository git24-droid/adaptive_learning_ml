[theme]
# A vibrant, electric primary blue for buttons, sliders, and active states
primaryColor = "#2563eb"

# A sleek, slightly cool off-white for the main app background
backgroundColor = "#f8fafc"

# Pure white for the sidebar to create a sharp, floating separation
secondaryBackgroundColor = "#ffffff"

# High-contrast, deep slate-black for ultra-crisp text readability
textColor = "#0f172a"

# Modern, clean typography
font = "sans serif"

[server]
maxUploadSize = 200
enableXsrfProtection = false

[browser]
gatherUsageStats = false
